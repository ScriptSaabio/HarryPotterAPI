<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>

<body>

    <header>
        <h1>Harry Potter</h1>
        <div class="searchBox">

            <input type="text" id="search" placeholder="Nome do personagem">

            <button id="searchBtn">Buscar</button>

        </div>
    </header>

    <main>
        <h1>Personagens</h1>
        <section>
            <div id="img"><img src="./img/hogwarts.jpeg" alt="IMG"></div>
            <div id="texto">
                <p id="name">Nome</p>
                <p id="house">Casa</p>
                <p id="actor">Ator</p>
                <p id="species">Especie</p>
                <div id="voltar-avancar">
                    <button id="prevBtn" type="button">Anterior</button>
                    <button id="nextBtn" type="button">Proximo</button>
                </div>
            </div>
        </section>
    </main>

</body>

</html>
